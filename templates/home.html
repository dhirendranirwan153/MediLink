<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home</title>
    <link rel="stylesheet" href="phone.css">
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    .navbar {
        display: flex;
        justify-content: space-around;
        margin: 0px;
        box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.4);
        font-family: 'Ubuntu', sans-serif;

    }

    .navbar ul {
        display: flex;
        margin: 22px;
        list-style: none;

    }

    .navbar ul li a {
        color: rgb(47, 95, 117);
        font-size: 25px;
        font-weight: bold;
        text-decoration: none;
        padding: 5px 10px;
        margin: 25px;
        text-shadow: 1px 1px 2px white;
        height: 4px;
        width: 12px;
        font-family: 'ubantu';


    }

    .navbar li a:hover {
        background-color: black;


color: white;
        border-radius: 10px;
        font-size: 25px;


    }

    .navbar::before {
        content: "";
        background-color: rgb(223, 223, 223);
        position: absolute;
        z-index: -1;
        opacity: 0.7;
        height: 90%;
        width: 100%;
    }

    .navbar img {
        width: 150px;
        height: 75px;
        padding: 10px 40px;
    }





    .section {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 25px;
    }

    .section img {
        height: 150px;
        width: 160px;
    }

    .section h1 {
        color: rgb(47, 95, 117);
        text-shadow: 2px 1px 2px white;
        font-size: 40px;
    }

    .section p {
        margin-top: 24px;
        font-size: 30px;
        font-family: 'Ubuntu', sans-serif;
        text-align: center;
        font-weight: bold;
        color: rgb(47, 95, 117);
        text-shadow: 1px 1px 2px white;

    }

    .section::before {
        content: "";
        position: absolute;
        background: url('static/images/background.jpeg') no-repeat top center /cover;
    
        height: 800px;
        width: 100%;
        z-index: -1;
        opacity: 0.6;
        margin-bottom: 100px;

    }

    .login-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 100px;
        margin-top: 120px;
    }

    .login-buttons button {
        height: 100px;
        width: 300px;
        padding: 30px 40px;
        font-size: 30px;
        border-radius: 8px;
        background-color: #467b7b;
        cursor: pointer;
        box-shadow: 2px 2px 2px black, inset 2px 2px 2px white;
        font-family: 'Ubuntu', sans-serif;
        font-weight: bold;
        text-shadow: 2px 2px 2px gray;

    }

    .login-buttons button:hover {
        background-color: #2f6f7e;
        color: white;
        text-shadow: 1px 1px 2px white;
        transition: 0.8s;
        transform: scale(1.03);
    }
</style>

<body>
    <nav class="navbar">
        <img src="static/images/w.jpeg" alt="">
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About </a></li>
            <li><a href="/services">Services</a></li>
            <li><a href="/contact">Contact </a></li>
            

        </ul>

    </nav>
    <div class="section">
        <img src="static/images/logo.png.jpeg" alt="">
        <h1> Smart Healthcare Made Simple </h1>

        <p>“Securely connecting patients and hospitals in one place.” </p>

        <div class="login-buttons">
            <a href="{{ url_for('sign_up') }}">
                  <button type="button">Register</button>
              </a>
              <a href="{{ url_for('patient_login')}}">  
                  <button type="button">Patient Login</button>
              </a>
              <a href="{{ url_for('doctor_login')}}">
                  <button type="button">Doctor Login</button>
              </a>
        </div>

    </div>
</body>

</html>

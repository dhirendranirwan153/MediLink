<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient_register</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .SignUp {
        display: flex;
        margin-top: 50px;
        margin-left: 330px;
        border: 1px solid gray;
        box-shadow: 5px 5px 12px gray, -2px -2px 5px gray;

        height: 600px;
        width: 800px;
    }

 

    .box1 p {
        text-align: center;
        color: rgb(64, 113, 113);

    }
     .box1 {
        border: none;

        height: 600px;
        width: 500px;
        display: flex;
       
        align-items: center;
        flex-direction: column;
        background-image: url('static/images/Pregister.jpeg');

         background-repeat: no-repeat;

        font-size: 20px;
        color: white;

    }


    .box1 button {
        padding: 5px 10px;
        border: none;
        box-shadow: 1px 1px 3px gray;
        border-radius: 3px;
        font-size: 20px;
        font-weight: bold;
        color: rgb(64, 113, 113);
        margin-bottom: 40px;

    }

    .box1 button:hover {
        background-color: gainsboro;
        color: black;
        transform: scale(1.04);
        cursor: pointer;
    }

    .box2 {

        height: 600px;
        box-shadow: inset 3px 3px 4px rgb(184, 183, 183);
        padding: 40px 2px;

    }

    .box2 h2 {
        text-align: center;
        font-size: 30px;
        color: rgb(64, 113, 113);


    }

    .form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        margin: 30px 5px;


    }

    .form-group {
        margin: 10px 5px;


    }

    .form-group input {
        padding: 20px 0px 5px 20px;
        font-size: 15px;
        border-radius: 4px;
        border: none;
        box-shadow: 2px 2px 4px gray;

    }

    .form-group input:hover {
        border: none;
        color: black;

    }

    .form-group:nth-child(3) {

        grid-column: 1 / span 2;


    }



    #Email input {
        width: 100%;
    }






    input[type="submit"],
    input[type="reset"] {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 20px;
        margin: 20px 15px;
        color: rgb(64, 113, 113);
        font-weight: bold;
        box-shadow: 1px 2px 3px gray;


    }



    input[type="submit"]:hover {
        background-color: #69866f;
        transform: scale(1.05);
        color: black;

    }

    input[type="reset"]:hover {
        background-color: #78474c;
        transform: scale(1.05);
        color: white;
    }


    input:focus {
        outline: none;
        border: #208434;
    }

    #password {
        position: relative;
    }

    #password img {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
    }

    #confirmpassword {
        position: relative;
    }

    #confirmpassword img {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
    }

   
    .box1
    p {
        text-shadow: 2px 1px 2px seagreen;
        font-weight: bold;
        margin-bottom: 50px;
        font-size: 24px;
        font-family:cursive;

    }

   .box1 h2 {
        margin-bottom: 100px ;
        font-size:35px ;
        color: rgb(38, 138, 149);
        box-shadow: 2px 4px 2px gray;
        margin-top: 10px;
        border-radius: 4px;
    }

    .box2 h2 {
        text-shadow: 2px 2px 2px rgb(161, 174, 168);
    }

    .form-error {
        color: red;
    }
</style>

<body>

    <div class="SignUp">
        <div class="box1">
            <h2> Welcome Back!</h2>
            <p> To keep connected with us please <br>login with your personal info</p>
            <button> Sign in</button>
        </div>
        <form action="/patient_register" name="form" onsubmit="return validateForm()" method="post">
            <div class="box2">
                <h2> REGISTER FORM</h2>


                <div class="form">

                    <div class="form-group" id="Firstname">
                        <input type="text" name="fform" placeholder="First Name" required>
                        <div class="form-error"></div>
                    </div>

                    <div class="form-group" id="Lastname">
                        <input type="text" name="lform" placeholder="Last Name" required>
                        <div class="form-error"></div>

                    </div>

                    

                    <div class="form-group" id="Email">
                        <input type="email" name="eform" placeholder="Your Email" required>
                        <div class="form-error"></div>

                    </div>

                    <div class="form-group" id="password">
                        <input type="password" id="pass" name="pform" placeholder="Password" required>
                        <img id="img" src="" alt="">
                        <div class="form-error"></div>

                    </div>

                    <div class="form-group" id="confirmpassword">
                        <input type="password" id="cpass" name="cform" placeholder="Confirm Password" required>
                        <img id="cimg" src="" alt="">
                        <div class="form-error"></div>

                    </div>

                    <div class="form-group" id="number">
                        <input type="tel" name="Phone" placeholder="Phone Number" required>
                        <div class="form-error"></div>

                    </div>

                    <div class="form-group" id="date">
                        Date of birth: <input type="date" name="dob" required>
                        <div class="form-error"></div>
                    </div>


                   

                </div>
                <div id=" tc">
                    <input type="checkbox" required> I agree to the <a href="/terms&cond."> Terms and Conditions</a>
                </div>
                <div class="btn">
                    <input type="submit" value="Register">
                    <input type="reset" value=" Reset Now">
                </div>

            </div>
        </form>
    </div>
</body>
<script>
    function clearError() {
        errors = document.getElementsByClassName('form-error');
        for (let item of errors) {
            item.innerHTML = "";
        }
    }
    function seterror(id, error) {
        let element = document.getElementById(id);
        element.getElementsByClassName('form-error')[0].innerHTML = error;
    }


    function validateForm() {
        let returnval = true;
        clearError();
        var Firstname = document.forms['form']['fform'].value;


        if (!/^[A-Za-z]+$/.test(Firstname)) {
            seterror("Firstname", "*Only alphabets are allowed");
            returnval = false;
        }

        var Lastname = document.forms['form']['lform'].value;


        if (!/^[A-Za-z]+$/.test(Lastname)) {
            seterror("Lastname", "*Only alphabets are allowed");
            returnval = false;
        }

        let Email = document.forms['form']['eform'].value;


        if (Email.length > 30) {
            seterror("Email", "*Email will be less than 30 ");
            returnval = false;
        }

        var phone = document.forms['form']['Phone'].value;

        if (phone.length != 10) {
            seterror("number", "*Enter valid 10 digit number");

            returnval = false;
        }
        var password = document.forms['form']['pform'].value;
        var confirmPassword = document.forms['form']['cform'].value;

        if (password !== confirmPassword) {
            seterror("confirmpassword", "*Passwords do not match");
            returnval = false;


        }
        return returnval;

    }

    let password = document.getElementById("pass");
    let icon = document.getElementById("img");

    icon.addEventListener("click", function () {
        if (password.type === "password") {
            password.type = "text";
            icon.src = "../images/hide.png";
        } else {
            password.type = "password";
            icon.src = "../images/show.png";
        }
    });

    // Confirm Password toggle
    let cpassword = document.getElementById("cpass");
    let cicon = document.getElementById("cimg");

    cicon.addEventListener("click", function () {
        if (cpassword.type === "password") {
            cpassword.type = "text";
            cicon.src = "../images/hide.png";
        } else {
            cpassword.type = "password";
            cicon.src = "../images/show.png";
        }
    });


</script>

</html>

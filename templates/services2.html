<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>services</title>
</head>
<style>
    .services {
        background-color: rgb(64, 113, 113);
        height: 400px;
        margin: 100px 200px;
        border-radius: 10px;
    }

    .boxes {
        display: flex;
        flex-wrap: wrap;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        margin: 50px;
        box-sizing: border-box;
    }

    h1 {
        text-align: center;
        color: white;
        text-shadow: 2px 2px 3px black;
    }

    .box {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: white;
        height: 200px;
        width: 150px;
        margin: 10px;
        border: 2px solid rgb(231, 232, 232);
        border-radius: 10px;
        box-shadow: 2px 2px 3px black, inset 2px 2px 4px black;
        padding: 10px;
    }

    .box:hover {
   
        position: relative;
        overflow: hidden;
        transition: all .3s ease-in-out;
        background: rgb(135, 206, 235);
        opacity: 1;
        cursor: pointer;
        color: #000;
        transform:scale(1.02)

    }

 

    h3 {
        padding: 10px;
        text-align: 4px;
        color: black;
        text-shadow: 2px 2px 4px rgb(168, 162, 162);
    }

    img {
        height: 100px;
        width: 100px
    }
</style>

<body>
    <div class="services">
        <h1>..Our Services..</h1>
        <div class="boxes">

            <div class="box">
                <img src="static/images/Records.jpeg" alt="">
                <h3>Digital Records</h3>
            </div>
            <div class="box">
                <img src="static/images/Hospitals.jpeg" alt="">
                <h3>Hospitals Network</h3>
            </div>
            <div class="box">
                <img src="static/images/appointment.jpeg" alt="">
                <h3>Appointment Booking</h3>
            </div>
            <div class="box">
                <img src="static/images/Profile.jpeg" alt="">
                <h3>Patient Profile </h3>
            </div>

        </div>
    </div>
</body>

</html>

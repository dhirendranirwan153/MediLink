<style>
    h2 {

    }

    .about {
        background: azure;

        box-shadow: 5px 5px 5px black, inset 10px 15px 10px rgb(104, 143, 148);

<body>
    
    <div class="about">
        <h2> About Medilink</h2>
        <div class="about1">
            <img src="static/images/About.jpeg" alt="">

               "Medi-Link is a centralized digital platform designed to connect patients and hospitals
